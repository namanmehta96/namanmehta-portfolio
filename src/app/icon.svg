<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Palette hex is allowed in this standalone asset (a favicon can't read CSS vars).
       Amber tile so the mark is unmistakable at tab size — a dark tile with a light
       N reads exactly like Safari's letter fallback. -->
